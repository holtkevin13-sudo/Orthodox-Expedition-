<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c9922a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Expedition">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Orthodox Expedition</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --gold:#c9922a;--gold-light:#f0c96e;--gold-bright:#ffd700;
  --parchment:#f4e8c1;--parchment-dark:#e8d5a0;
  --burgundy:#6b1a1a;--byzantine:#2c1654;
  --bg:#0e0800;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Crimson Text',serif;
  background-color:var(--bg);
  background-image:
    radial-gradient(ellipse at 50% 0%,   rgba(107,26,26,0.55) 0%,transparent 55%),
    radial-gradient(ellipse at 100% 100%,rgba(44,22,84,0.4)   0%,transparent 50%),
    radial-gradient(ellipse at 0%   80%, rgba(107,26,26,0.2)  0%,transparent 40%);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:1.5rem;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(201,146,42,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(201,146,42,0.025) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none;
}

/* LOADING */
#loading-overlay{
  position:fixed;inset:0;z-index:100;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  transition:opacity 0.4s;
}
.loading-mark{font-family:'Cinzel',serif;font-size:2rem;color:rgba(201,146,42,0.4);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.3;}50%{opacity:0.9;}}

/* CARD */
.login-card{
  position:relative;z-index:1;
  width:100%;max-width:400px;
  background:linear-gradient(160deg,rgba(44,22,84,0.97) 0%,rgba(18,8,40,0.99) 45%,rgba(107,26,26,0.97) 100%);
  border:1px solid rgba(201,146,42,0.35);
  border-radius:22px;padding:2.5rem 2rem 2rem;
  box-shadow:0 24px 64px rgba(0,0,0,0.75),0 0 0 1px rgba(201,146,42,0.08) inset,0 1px 0 rgba(201,146,42,0.15) inset;
  animation:cardIn 0.6s cubic-bezier(0.34,1.2,0.64,1) forwards;
}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.login-card::before,.login-card::after{content:'✦';position:absolute;color:rgba(201,146,42,0.1);font-size:3.5rem;line-height:1;}
.login-card::before{top:-0.5rem;left:-0.5rem;}
.login-card::after{bottom:-0.5rem;right:-0.5rem;}

/* HEADER */
.top-cross{text-align:center;margin-bottom:1.25rem;font-family:'Cinzel',serif;color:rgba(201,146,42,0.45);font-size:0.7rem;letter-spacing:0.8rem;}
.login-title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.3rem,5vw,1.75rem);color:var(--gold-light);text-align:center;line-height:1.25;text-shadow:0 0 24px rgba(201,146,42,0.4),0 2px 4px rgba(0,0,0,0.6);margin-bottom:0.25rem;}
.login-subtitle{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.28em;color:rgba(201,146,42,0.4);text-align:center;text-transform:uppercase;margin-bottom:1.75rem;}

/* VERSE */
.verse-block{background:rgba(201,146,42,0.06);border:1px solid rgba(201,146,42,0.15);border-radius:10px;padding:0.875rem 1rem;margin-bottom:1.75rem;text-align:center;}
.verse-text{font-family:'Crimson Text',serif;font-style:italic;font-size:clamp(0.88rem,2.8vw,1rem);color:rgba(244,232,193,0.6);line-height:1.6;margin-bottom:0.4rem;}
.verse-ref{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.15em;color:rgba(201,146,42,0.4);text-transform:uppercase;}

/* DIVIDER */
.form-divider{display:flex;align-items:center;gap:0.75rem;margin-bottom:1.25rem;}
.form-divider-line{flex:1;height:1px;background:rgba(201,146,42,0.12);}
.form-divider-mark{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.2em;color:rgba(201,146,42,0.3);text-transform:uppercase;white-space:nowrap;}

/* FIELDS */
.field{margin-bottom:1rem;}
.field-label{font-family:'Cinzel',serif;font-size:0.68rem;letter-spacing:0.12em;color:rgba(201,146,42,0.5);text-transform:uppercase;display:block;margin-bottom:0.4rem;}
.field-input{width:100%;padding:0.8rem 1rem;background:rgba(244,232,193,0.06);border:1px solid rgba(201,146,42,0.22);border-radius:10px;font-family:'Crimson Text',serif;font-size:1rem;color:var(--parchment);outline:none;transition:all 0.2s;-webkit-appearance:none;appearance:none;}
.field-input::placeholder{color:rgba(244,232,193,0.2);}
.field-input:focus{border-color:rgba(201,146,42,0.55);background:rgba(244,232,193,0.09);box-shadow:0 0 0 3px rgba(201,146,42,0.08);}

/* BUTTON */
.login-btn{width:100%;padding:0.9rem;min-height:52px;background:linear-gradient(135deg,var(--gold) 0%,var(--gold-bright) 100%);border:none;border-radius:11px;font-family:'Cinzel',serif;font-size:0.85rem;letter-spacing:0.1em;color:var(--bg);font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 16px rgba(201,146,42,0.25);margin-top:0.25rem;}
.login-btn:hover{box-shadow:0 6px 24px rgba(201,146,42,0.4);transform:translateY(-1px);}
.login-btn:active{transform:scale(0.98);}
.login-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.btn-loading{display:inline-flex;align-items:center;gap:0.5rem;}
.btn-spinner{width:14px;height:14px;border-radius:50%;border:2px solid rgba(26,15,0,0.3);border-top-color:var(--bg);animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ERROR */
.login-error{min-height:1.4rem;font-family:'Crimson Text',serif;font-style:italic;font-size:0.82rem;color:#f87171;text-align:center;margin-top:0.75rem;}

/* FOOTER */
.bottom-mark{text-align:center;margin-top:1.5rem;font-family:'Cinzel',serif;font-size:0.55rem;letter-spacing:0.25em;color:rgba(201,146,42,0.2);text-transform:uppercase;}
</style>
</head>
<body>

<div id="loading-overlay"><div class="loading-mark">☩</div></div>

<div class="login-card">
  <div class="top-cross">✦ ☩ ✦</div>
  <h1 class="login-title">The Orthodox<br>Expedition</h1>
  <div class="login-subtitle">Greek Orthodox Family Study</div>

  <div class="verse-block">
    <div class="verse-text">"Seek and you will find, knock and the door will be opened to you."</div>
    <div class="verse-ref">Matthew 7:7</div>
  </div>

  <div class="form-divider">
    <div class="form-divider-line"></div>
    <div class="form-divider-mark">Enter the Expedition</div>
    <div class="form-divider-line"></div>
  </div>

  <div class="field">
    <label class="field-label" for="email">Email or Username</label>
    <input type="text" id="email" class="field-input" placeholder="Email or username" autocomplete="username"
      onkeydown="if(event.key==='Enter')document.getElementById('password').focus()">
  </div>

  <div class="field">
    <label class="field-label" for="password">Password</label>
    <input type="password" id="password" class="field-input" placeholder="••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()">
  </div>

  <button class="login-btn" id="login-btn" onclick="doLogin()">Enter the Expedition</button>
  <div class="login-error" id="login-error"></div>
  <div class="bottom-mark">☩ &nbsp; Orthodox Expedition &nbsp; ☩</div>
  <div style="text-align:center;margin-top:1.25rem;">
    <a href="register.html" style="font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.15em;color:rgba(201,146,42,0.4);text-decoration:none;border-bottom:1px solid rgba(201,146,42,0.2);padding-bottom:2px;">New family? Join the Expedition ›</a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ksfnsryfmkafwirzgjoe.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzZm5zcnlmbWthZndpcnpnam9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODM4MTcsImV4cCI6MjA5MTI1OTgxN30.mHQty44WBnjQY8BJ8KbPk_pp-yTcOaifGxCZPUO4xpY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function routeByRole(userId){
  const {data:profile,error} = await sb.from('profiles').select('role').eq('id',userId).single();
  if(error||!profile){
    await sb.auth.signOut();
    showError('Account not found. Please contact an administrator.');
    resetBtn();
    return;
  }
  // Route by role
  if(profile.role==='superuser') { window.location.href='admin.html'; return; }
  if(profile.role==='admin')     { window.location.href='admin.html'; return; }
  if(profile.role==='parent')    { window.location.href='parent.html'; return; }
  window.location.href='home.html'; // explorer
}

async function checkSession(){
  try {
    const timeout = new Promise(resolve =>
      setTimeout(() => resolve({data:{session:null}}), 3000)
    );
    const result = await Promise.race([sb.auth.getSession(), timeout]);
    const session = result && result.data && result.data.session;
    if(session){
      await routeByRole(session.user.id);
    } else {
      hideLoading();
    }
  } catch(e) {
    console.error('Session check failed:', e);
    hideLoading();
  }
}

function hideLoading(){
  const ol = document.getElementById('loading-overlay');
  ol.style.opacity='0';
  setTimeout(()=>ol.style.display='none',400);
}

function resetBtn(){
  const btn = document.getElementById('login-btn');
  btn.disabled=false;
  btn.textContent='Enter the Expedition';
}

function showError(msg){
  document.getElementById('login-error').textContent=msg;
}

async function doLogin(){
  let identifier = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('login-btn');

  document.getElementById('login-error').textContent='';
  if(!identifier){showError('Please enter your email or username.');return;}
  if(!password){showError('Please enter your password.');return;}

  btn.disabled=true;
  btn.innerHTML='<span class="btn-loading"><span class="btn-spinner"></span>Entering...</span>';

  // If no @ symbol treat as username — convert to generated email
  let email = identifier;
  if(!identifier.includes('@')){
    email = identifier.toLowerCase() + '@orthodox-expedition.app';
  }

  const {data,error} = await sb.auth.signInWithPassword({email,password});

  if(error){
    showError('Incorrect email or password. Try again.');
    document.getElementById('password').value='';
    document.getElementById('password').focus();
    resetBtn();
    return;
  }

  await routeByRole(data.user.id);
}

checkSession();
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
