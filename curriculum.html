<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Topics — The Orthodox Expedition</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --gold:#c9922a;--gold-light:#f0c96e;--gold-bright:#ffd700;
  --parchment:#f4e8c1;--parchment-dark:#e8d5a0;--parchment-deeper:#d4b870;
  --ink:#1a0f00;--ink-light:#3d2b1f;
  --burgundy:#6b1a1a;--byzantine:#2c1654;--byzantine-light:#4a2a7a;
  --green:#16a34a;--green-light:#22c55e;
  --shadow:rgba(26,15,0,0.5);
  --bg:#0e0800;--nav-h:72px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;overflow-x:hidden;}
body{
  font-family:'Crimson Text',serif;
  background-color:var(--bg);
  background-image:
    radial-gradient(ellipse at 50% 0%,rgba(107,26,26,0.45) 0%,transparent 55%),
    radial-gradient(ellipse at 100% 100%,rgba(44,22,84,0.3) 0%,transparent 50%);
  min-height:100vh;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(201,146,42,0.022) 1px,transparent 1px),
    linear-gradient(90deg,rgba(201,146,42,0.022) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none;z-index:0;
}

/* ── COIN RAIN ─────────────────────────────────────────────── */
#coin-rain{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden;}
.coin-p{position:absolute;top:-60px;font-size:1.5rem;animation:coinFall linear forwards;}
@keyframes coinFall{0%{transform:translateY(0) rotate(0deg);opacity:1;}85%{opacity:1;}100%{transform:translateY(110vh) rotate(540deg) scale(0.4);opacity:0;}}

/* ── LOADING ───────────────────────────────────────────────── */
#loading{position:fixed;inset:0;z-index:400;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.loading-mark{font-family:'Cinzel',serif;font-size:2rem;color:rgba(201,146,42,0.4);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.3;}50%{opacity:0.8;}}

/* ── APP ───────────────────────────────────────────────────── */
#app{display:none;position:relative;z-index:1;}
.page{max-width:480px;margin:0 auto;padding:1.25rem 1rem calc(var(--nav-h) + 1.5rem);}

/* ── HEADER ────────────────────────────────────────────────── */
.app-header{text-align:center;padding:1.25rem 1rem 1rem;border-bottom:1px solid rgba(201,146,42,0.18);margin-bottom:1.25rem;}
.app-name{font-family:'Cinzel Decorative',serif;font-size:clamp(0.9rem,3.2vw,1.1rem);color:var(--gold-light);letter-spacing:0.06em;text-shadow:0 0 20px rgba(201,146,42,0.35);}
.app-divider{color:rgba(201,146,42,0.35);letter-spacing:0.6rem;font-size:0.65rem;margin-top:0.3rem;}

/* ── JOURNEY STRIP ─────────────────────────────────────────── */
.journey-strip{
  background:rgba(244,232,193,0.03);
  border:1px solid rgba(201,146,42,0.18);
  border-radius:14px;padding:1rem 0.875rem;
  margin-bottom:1.25rem;overflow:hidden;
}
.journey-title{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.2em;color:rgba(201,146,42,0.45);text-transform:uppercase;margin-bottom:0.75rem;}
.journey-track{
  display:flex;align-items:center;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding:0.25rem 0 0.5rem;gap:0;
}
.journey-track::-webkit-scrollbar{height:3px;}
.journey-track::-webkit-scrollbar-thumb{background:rgba(201,146,42,0.2);border-radius:2px;}
.journey-stop{
  display:flex;flex-direction:column;align-items:center;
  flex:0 0 auto;position:relative;
  cursor:pointer;padding:0 0.25rem;
}
.journey-stop-circle{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;font-size:0.65rem;font-weight:700;
  transition:all 0.4s;position:relative;z-index:1;
  border:2px solid rgba(201,146,42,0.2);
  background:rgba(255,255,255,0.03);
  color:rgba(201,146,42,0.3);
}
.journey-stop.complete .journey-stop-circle{
  background:linear-gradient(135deg,var(--gold),var(--gold-bright));
  border-color:var(--gold-bright);color:var(--ink);
  box-shadow:0 0 10px rgba(255,215,0,0.35);
}
.journey-stop.active .journey-stop-circle{
  background:rgba(201,146,42,0.15);
  border-color:var(--gold);color:var(--gold-light);
  box-shadow:0 0 0 3px rgba(201,146,42,0.1);
  animation:stopPulse 2s ease-in-out infinite;
}
.journey-stop.conclusion .journey-stop-circle{
  font-size:0.8rem;
}
@keyframes stopPulse{0%,100%{box-shadow:0 0 0 3px rgba(201,146,42,0.1);}50%{box-shadow:0 0 0 5px rgba(201,146,42,0.2);}}
.journey-stop-label{
  font-family:'Cinzel',serif;font-size:0.5rem;
  color:rgba(201,146,42,0.3);margin-top:0.3rem;
  text-align:center;white-space:nowrap;
  max-width:36px;overflow:hidden;text-overflow:ellipsis;
}
.journey-stop.complete .journey-stop-label{color:rgba(201,146,42,0.6);}
.journey-stop.active .journey-stop-label{color:var(--gold-light);}
.journey-connector{
  width:20px;height:2px;flex-shrink:0;
  background:rgba(201,146,42,0.12);
  transition:background 0.4s;
}
.journey-connector.lit{background:linear-gradient(90deg,var(--gold),rgba(201,146,42,0.4));}

/* Progress text */
.journey-progress{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:0.5rem;padding-top:0.5rem;
  border-top:1px solid rgba(201,146,42,0.1);
}
.jp-text{font-family:'Cinzel',serif;font-size:0.6rem;color:rgba(201,146,42,0.4);}
.jp-bar-wrap{flex:1;margin:0 0.75rem;}
.jp-bar{height:4px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;}
.jp-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--gold-bright));transition:width 1s cubic-bezier(0.4,0,0.2,1);}

/* ── TOPIC CARDS ───────────────────────────────────────────── */
.topic-card{
  border-radius:16px;margin-bottom:0.875rem;overflow:hidden;
  transition:all 0.3s;
}

/* ACTIVE TOPIC */
.topic-card.active-topic{
  background:linear-gradient(160deg,rgba(44,22,84,0.95) 0%,rgba(18,8,40,0.98) 50%,rgba(107,26,26,0.95) 100%);
  border:1px solid rgba(201,146,42,0.4);
  box-shadow:0 8px 32px rgba(0,0,0,0.5),0 0 20px rgba(201,146,42,0.08);
}
/* LOCKED */
.topic-card.locked{
  background:rgba(244,232,193,0.02);
  border:1px solid rgba(201,146,42,0.1);
  opacity:0.65;
}
/* COMPLETE */
.topic-card.complete{
  background:rgba(22,163,74,0.05);
  border:1px solid rgba(22,163,74,0.25);
}
/* AVAILABLE (not started) */
.topic-card.available{
  background:rgba(244,232,193,0.03);
  border:1px solid rgba(201,146,42,0.2);
}

/* TOPIC HEADER */
.topic-header{
  display:flex;align-items:center;gap:0.875rem;
  padding:1rem;cursor:pointer;
  border:none;background:none;width:100%;text-align:left;
}
.topic-stop-num{
  font-family:'Cinzel Decorative',serif;font-size:1rem;
  flex-shrink:0;width:32px;text-align:center;
  color:rgba(201,146,42,0.4);transition:color 0.3s;
}
.topic-card.active-topic .topic-stop-num{color:var(--gold-bright);}
.topic-card.complete .topic-stop-num{color:var(--green-light);}
.topic-header-body{flex:1;min-width:0;}
.topic-eyebrow{
  font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.18em;
  text-transform:uppercase;color:rgba(201,146,42,0.4);margin-bottom:0.2rem;
}
.topic-card.active-topic .topic-eyebrow{color:rgba(201,146,42,0.6);}
.topic-name{
  font-family:'Cinzel',serif;font-size:0.88rem;font-weight:700;
  color:rgba(244,232,193,0.6);line-height:1.3;
}
.topic-card.active-topic .topic-name{color:var(--gold-light);}
.topic-card.complete .topic-name{color:rgba(134,239,172,0.8);}
.topic-progress-row{display:flex;align-items:center;gap:0.5rem;margin-top:0.3rem;}
.topic-progress-bar{flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
.topic-progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--gold-bright));transition:width 0.8s cubic-bezier(0.4,0,0.2,1);}
.topic-card.complete .topic-progress-fill{background:linear-gradient(90deg,var(--green),var(--green-light));}
.topic-progress-text{font-family:'Cinzel',serif;font-size:0.58rem;color:rgba(201,146,42,0.4);flex-shrink:0;}
.topic-chevron{color:rgba(201,146,42,0.3);font-size:0.9rem;flex-shrink:0;transition:transform 0.25s;}
.topic-card.expanded .topic-chevron{transform:rotate(90deg);}

/* TOPIC BODY */
.topic-body{display:none;padding:0 1rem 1rem;}
.topic-card.expanded .topic-body{display:block;}
.topic-description{
  font-size:0.82rem;color:rgba(244,232,193,0.4);
  font-style:italic;line-height:1.5;
  margin-bottom:0.875rem;
  padding-bottom:0.875rem;
  border-bottom:1px solid rgba(201,146,42,0.1);
}

/* ── SESSION CARDS ─────────────────────────────────────────── */
.session-cards{display:flex;flex-direction:column;gap:0.5rem;margin-bottom:0.875rem;}
.session-card{
  background:rgba(244,232,193,0.03);
  border:1px solid rgba(201,146,42,0.12);
  border-radius:10px;overflow:hidden;
  transition:all 0.25s;
}
.session-card.done{
  background:rgba(22,163,74,0.05);
  border-color:rgba(22,163,74,0.2);
}
.session-card.current-session{
  border-color:rgba(201,146,42,0.35);
  background:rgba(201,146,42,0.04);
}
.session-card-header{
  display:flex;align-items:center;gap:0.625rem;
  padding:0.7rem 0.875rem;cursor:pointer;
  border:none;background:none;width:100%;text-align:left;
}
.session-id{
  font-family:'Cinzel',serif;font-size:0.6rem;
  color:rgba(201,146,42,0.35);flex-shrink:0;width:24px;
}
.session-card.done .session-id{color:rgba(134,239,172,0.5);}
.session-title-text{
  font-family:'Cinzel',serif;font-size:0.78rem;
  color:rgba(244,232,193,0.65);flex:1;line-height:1.3;
  text-align:left;
}
.session-card.done .session-title-text{color:rgba(134,239,172,0.7);}
.session-card.current-session .session-title-text{color:var(--gold-light);}
.session-coins-badge{
  font-family:'Cinzel',serif;font-size:0.6rem;
  color:rgba(201,146,42,0.4);flex-shrink:0;
}
.session-check{color:rgba(134,239,172,0.7);font-size:0.9rem;flex-shrink:0;}
.session-expand-icon{color:rgba(201,146,42,0.25);font-size:0.75rem;flex-shrink:0;transition:transform 0.2s;}
.session-card.expanded .session-expand-icon{transform:rotate(90deg);}

/* SESSION BODY */
.session-body{display:none;padding:0 0.875rem 0.875rem;}
.session-card.expanded .session-body{display:block;}
.session-description{
  font-size:0.8rem;color:rgba(244,232,193,0.4);
  font-style:italic;line-height:1.5;margin-bottom:0.75rem;
}

/* Key concepts */
.concepts-label{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.15em;color:rgba(201,146,42,0.45);text-transform:uppercase;margin-bottom:0.4rem;}
.concepts-list{list-style:none;display:flex;flex-direction:column;gap:0.25rem;margin-bottom:0.75rem;}
.concept-item{
  display:flex;gap:0.5rem;align-items:flex-start;
  font-size:0.78rem;color:rgba(244,232,193,0.45);line-height:1.4;
}
.concept-mark{color:rgba(201,146,42,0.4);flex-shrink:0;margin-top:0.1rem;font-size:0.65rem;}

/* Video embed */
.video-wrap{
  position:relative;width:100%;padding-top:56.25%;
  background:rgba(255,255,255,0.03);border-radius:8px;
  overflow:hidden;margin-bottom:0.75rem;
  border:1px solid rgba(201,146,42,0.12);
}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.video-placeholder{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:0.5rem;
  color:rgba(201,146,42,0.25);font-family:'Cinzel',serif;font-size:0.7rem;
  letter-spacing:0.12em;text-transform:uppercase;
}
.video-placeholder-icon{font-size:1.5rem;opacity:0.4;}

/* Game link */
.game-link{
  display:flex;align-items:center;gap:0.625rem;
  background:rgba(44,22,84,0.15);border:1px solid rgba(124,58,237,0.2);
  border-radius:8px;padding:0.625rem 0.875rem;
  margin-bottom:0.75rem;text-decoration:none;
  transition:all 0.2s;cursor:pointer;
}
.game-link:hover{background:rgba(44,22,84,0.25);border-color:rgba(124,58,237,0.4);}
.game-link-icon{color:rgba(167,139,250,0.7);font-size:1rem;}
.game-link-text{font-family:'Cinzel',serif;font-size:0.72rem;color:rgba(167,139,250,0.8);flex:1;}
.game-link-arrow{color:rgba(167,139,250,0.4);font-size:0.75rem;}

/* Journal prompt */
.journal-box{
  background:rgba(201,146,42,0.05);border:1px solid rgba(201,146,42,0.15);
  border-radius:8px;padding:0.75rem;margin-bottom:0.875rem;
}
.journal-label{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.15em;color:rgba(201,146,42,0.5);text-transform:uppercase;margin-bottom:0.35rem;}
.journal-text{font-size:0.8rem;color:rgba(244,232,193,0.5);font-style:italic;line-height:1.5;}

/* Complete button */
.session-complete-btn{
  width:100%;padding:0.75rem;min-height:48px;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold-bright) 100%);
  border:none;border-radius:9px;
  font-family:'Cinzel',serif;font-size:0.78rem;letter-spacing:0.08em;
  color:var(--ink);font-weight:700;cursor:pointer;
  transition:all 0.2s;
}
.session-complete-btn:active{transform:scale(0.98);}
.session-complete-btn:disabled{opacity:0.5;cursor:not-allowed;}
.session-done-indicator{
  display:flex;align-items:center;justify-content:center;gap:0.5rem;
  padding:0.625rem;
  font-family:'Cinzel',serif;font-size:0.75rem;
  color:rgba(134,239,172,0.7);
  background:rgba(22,163,74,0.08);border-radius:9px;
  border:1px solid rgba(22,163,74,0.2);
}

/* ── MASTERY ASSIGNMENT ─────────────────────────────────────── */
.mastery-card{
  background:rgba(201,146,42,0.06);
  border:1.5px solid rgba(201,146,42,0.25);
  border-radius:12px;padding:1rem;
  margin-top:0.25rem;
}
.mastery-eyebrow{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.18em;color:rgba(201,146,42,0.5);text-transform:uppercase;margin-bottom:0.4rem;}
.mastery-title{font-family:'Cinzel',serif;font-size:0.85rem;color:var(--gold-light);margin-bottom:0.5rem;}
.mastery-text{font-size:0.82rem;color:rgba(244,232,193,0.45);font-style:italic;line-height:1.5;margin-bottom:0.875rem;}
.mastery-status-row{display:flex;align-items:center;gap:0.625rem;flex-wrap:wrap;}
.mastery-badge{
  font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.08em;
  padding:0.2rem 0.6rem;border-radius:20px;
}
.mastery-badge.locked{background:rgba(107,26,26,0.2);color:rgba(244,232,193,0.3);border:1px solid rgba(107,26,26,0.3);}
.mastery-badge.available{background:rgba(201,146,42,0.1);color:rgba(201,146,42,0.6);border:1px solid rgba(201,146,42,0.2);}
.mastery-badge.pending{background:rgba(124,58,237,0.12);color:rgba(167,139,250,0.8);border:1px solid rgba(124,58,237,0.25);}
.mastery-badge.complete{background:rgba(22,163,74,0.1);color:rgba(134,239,172,0.8);border:1px solid rgba(22,163,74,0.25);}
.mastery-submit-btn{
  padding:0.5rem 1.25rem;min-height:40px;
  background:linear-gradient(135deg,var(--byzantine),var(--byzantine-light));
  border:none;border-radius:8px;
  font-family:'Cinzel',serif;font-size:0.72rem;
  color:rgba(244,232,193,0.9);cursor:pointer;transition:all 0.2s;
}
.mastery-submit-btn:disabled{opacity:0.4;cursor:not-allowed;}
.mastery-coins-badge{font-family:'Cinzel',serif;font-size:0.7rem;color:rgba(201,146,42,0.5);}

/* ── CONCLUSION CARD ───────────────────────────────────────── */
.conclusion-card{
  background:linear-gradient(135deg,rgba(44,22,84,0.6) 0%,rgba(107,26,26,0.6) 100%);
  border:1px solid rgba(201,146,42,0.3);
  border-radius:16px;padding:1.25rem;margin-bottom:0.875rem;
  text-align:center;
}
.conclusion-mark{font-size:1.5rem;margin-bottom:0.5rem;}
.conclusion-title{font-family:'Cinzel Decorative',serif;font-size:1rem;color:var(--gold-light);margin-bottom:0.35rem;}
.conclusion-sub{font-size:0.8rem;color:rgba(244,232,193,0.4);font-style:italic;line-height:1.5;}

/* ── BOTTOM NAV ────────────────────────────────────────────── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);
  background:rgba(8,4,0,0.97);border-top:1px solid rgba(201,146,42,0.18);
  display:flex;align-items:stretch;backdrop-filter:blur(16px);z-index:200;
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.2rem;cursor:pointer;border:none;background:none;padding:0.5rem 0.25rem;position:relative;transition:all 0.2s;text-decoration:none;}
.nav-item:active{background:rgba(201,146,42,0.06);}
.nav-mark{font-size:1rem;line-height:1;color:rgba(201,146,42,0.25);transition:all 0.25s;}
.nav-label{font-family:'Cinzel',serif;font-size:0.56rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(201,146,42,0.3);transition:all 0.25s;}
.nav-item.active .nav-mark{color:var(--gold-bright);text-shadow:0 0 12px rgba(255,215,0,0.6);}
.nav-item.active .nav-label{color:var(--gold-light);}
.nav-item.active::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:0 0 2px 2px;}
.nav-dot{position:absolute;top:0.4rem;right:calc(50% - 18px);width:7px;height:7px;border-radius:50%;background:#ef4444;border:1.5px solid rgba(8,4,0,0.9);display:none;}
.nav-dot.show{display:block;}

/* ── ANIMATIONS ────────────────────────────────────────────── */
.fade-up{opacity:0;transform:translateY(12px);animation:fadeUp 0.4s ease forwards;}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
.fade-up:nth-child(1){animation-delay:0.04s;}
.fade-up:nth-child(2){animation-delay:0.1s;}
.fade-up:nth-child(3){animation-delay:0.16s;}
</style>
</head>
<body>

<div id="coin-rain"></div>
<div id="loading"><div class="loading-mark">☩</div></div>

<div id="app">
<div class="page">

  <!-- HEADER -->
  <header class="app-header">
    <div class="app-name">The Orthodox Expedition</div>
    <div class="app-divider">✦ ☩ ✦</div>
  </header>

  <!-- JOURNEY STRIP -->
  <div class="journey-strip fade-up">
    <div class="journey-title">The Expedition Journey</div>
    <div class="journey-track" id="journey-track"></div>
    <div class="journey-progress">
      <span class="jp-text" id="jp-left">0 sessions complete</span>
      <div class="jp-bar-wrap"><div class="jp-bar"><div class="jp-fill" id="jp-fill"></div></div></div>
      <span class="jp-text" id="jp-right">0 of 61</span>
    </div>
  </div>

  <!-- TOPIC LIST -->
  <div id="topic-list"></div>

  <!-- CONCLUSION -->
  <div class="conclusion-card fade-up" id="conclusion-card" style="display:none;">
    <div class="conclusion-mark">☩</div>
    <div class="conclusion-title">The Conclusion</div>
    <div class="conclusion-sub">Looking back at the full expedition — and the Grand Presentation.</div>
  </div>

</div>
</div>

<!-- BOTTOM NAV -->

<script>

const SUPABASE_URL = 'https://ksfnsryfmkafwirzgjoe.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzZm5zcnlmbWthZndpcnpnam9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODM4MTcsImV4cCI6MjA5MTI1OTgxN30.mHQty44WBnjQY8BJ8KbPk_pp-yTcOaifGxCZPUO4xpY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── STATE ─────────────────────────────────────────────────────
let profile = null;
let allTopics = [];
let allSessions = [];
let completedIds = [];
let masteryData = [];
let activeTopicId = 0;
let expandedTopics = new Set();
let expandedSessions = new Set();

// ── AUTH ──────────────────────────────────────────────────────
sb.auth.onAuthStateChange(async(event,session)=>{
  if(session){
    const {data:prof} = await sb.from('profiles').select('role').eq('id',session.user.id).single();
    if(prof&&prof.role==='admin'){ window.location.href='admin.html'; return; }
    await loadAll(session.user.id);
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('bottom-nav').style.display='flex';
  } else {
    window.location.href='index.html';
  }
});
(async()=>{
  const {data:{session}} = await sb.auth.getSession();
  if(!session) window.location.href='index.html';
})();

// ── LOAD ──────────────────────────────────────────────────────
async function loadAll(userId){
  const [profRes, topicsRes, sessionsRes, spRes, tmRes] = await Promise.all([
    sb.from('profiles').select('*').eq('id',userId).single(),
    sb.from('topics').select('*').order('order_index'),
    sb.from('sessions').select('*').order('topic_id').order('order_index'),
    sb.from('session_progress').select('session_id').eq('explorer_id',userId),
    sb.from('topic_mastery').select('*').eq('explorer_id',userId).order('topic_id'),
  ]);
  profile      = profRes.data;
  allTopics    = topicsRes.data    || [];
  allSessions  = sessionsRes.data  || [];
  completedIds = (spRes.data||[]).map(s=>s.session_id);
  masteryData  = tmRes.data        || [];

  // Find active topic — first available or in-progress (non-conclusion)
  const mainTopics = allTopics.filter(t=>!t.is_conclusion);
  const active = masteryData.find(m=>{
    const t = mainTopics.find(t=>t.id===m.topic_id);
    return t && (m.status==='available'||m.status==='pending');
  });
  activeTopicId = active ? active.topic_id : 0;

  // Auto-expand active topic
  expandedTopics.add(activeTopicId);

  renderAll();
}

// ── RENDER ────────────────────────────────────────────────────
function renderAll(){
  renderJourneyStrip();
  renderTopics();
}

// ── JOURNEY STRIP ─────────────────────────────────────────────
function renderJourneyStrip(){
  const track = document.getElementById('journey-track');
  track.innerHTML='';

  const mainTopics = allTopics.filter(t=>!t.is_conclusion);
  const total = allSessions.filter(s=>{
    const t=allTopics.find(t=>t.id===s.topic_id);
    return t&&!t.is_conclusion;
  }).length;
  const done = completedIds.filter(id=>{
    const s=allSessions.find(s=>s.id===id);
    if(!s) return false;
    const t=allTopics.find(t=>t.id===s.topic_id);
    return t&&!t.is_conclusion;
  }).length;

  const pct = total>0?(done/total)*100:0;
  document.getElementById('jp-left').textContent=`${done} sessions complete`;
  document.getElementById('jp-right').textContent=`${done} of ${total}`;
  requestAnimationFrame(()=>setTimeout(()=>{
    document.getElementById('jp-fill').style.width=pct+'%';
  },150));

  mainTopics.forEach((topic,idx)=>{
    const mastery = masteryData.find(m=>m.topic_id===topic.id);
    const status = mastery?mastery.status:'locked';
    const isActive = topic.id===activeTopicId;
    const isComplete = status==='complete';

    // Connector before stop (not first)
    if(idx>0){
      const conn=document.createElement('div');
      conn.className='journey-connector'+(isComplete||mainTopics[idx-1].id===activeTopicId?'':
        masteryData.find(m=>m.topic_id===mainTopics[idx-1].id)?.status==='complete'?' lit':'');
      track.appendChild(conn);
    }

    const stop=document.createElement('div');
    stop.className=`journey-stop${isComplete?' complete':isActive?' active':''}`;
    stop.title=topic.title;
    stop.onclick=()=>scrollToTopic(topic.id);
    stop.innerHTML=`
      <div class="journey-stop-circle">${isComplete?'✦':idx+1}</div>
      <div class="journey-stop-label">${topic.title.split(' ')[0]}</div>`;
    track.appendChild(stop);
  });

  // Conclusion stop
  const conclusionTopic = allTopics.find(t=>t.is_conclusion);
  if(conclusionTopic){
    const conn=document.createElement('div');conn.className='journey-connector';track.appendChild(conn);
    const stop=document.createElement('div');
    stop.className='journey-stop conclusion';
    stop.title='The Conclusion';
    stop.innerHTML=`<div class="journey-stop-circle">☩</div><div class="journey-stop-label">End</div>`;
    track.appendChild(stop);
  }
}

// ── TOPICS ────────────────────────────────────────────────────
function renderTopics(){
  const list = document.getElementById('topic-list');
  list.innerHTML='';

  const mainTopics = allTopics.filter(t=>!t.is_conclusion);
  const conclusionTopic = allTopics.find(t=>t.is_conclusion);

  mainTopics.forEach((topic,idx)=>{
    const mastery = masteryData.find(m=>m.topic_id===topic.id);
    const status = mastery?mastery.status:'locked';
    const isActive = topic.id===activeTopicId;
    const isComplete = status==='complete';
    const isLocked = status==='locked';
    const isExpanded = expandedTopics.has(topic.id);

    const topicSessions = allSessions.filter(s=>s.topic_id===topic.id);
    const doneCount = topicSessions.filter(s=>completedIds.includes(s.id)).length;
    const pct = topicSessions.length>0?(doneCount/topicSessions.length)*100:0;

    const cardClass = isActive?'active-topic':isComplete?'complete':isLocked?'locked':'available';

    const card = document.createElement('div');
    card.className=`topic-card ${cardClass}${isExpanded?' expanded':''} fade-up`;
    card.id=`topic-${topic.id}`;
    card.style.animationDelay=`${idx*0.06+0.1}s`;

    let statusLabel = isComplete?'Complete':isActive?'In Progress':isLocked?'Locked':'Available';

    card.innerHTML=`
      <button class="topic-header" onclick="toggleTopic(${topic.id})">
        <span class="topic-stop-num">${isComplete?'✦':idx+1}</span>
        <div class="topic-header-body">
          <div class="topic-eyebrow">${statusLabel} · ${doneCount}/${topicSessions.length} sessions</div>
          <div class="topic-name">${topic.title}</div>
          ${!isLocked?`<div class="topic-progress-row">
            <div class="topic-progress-bar"><div class="topic-progress-fill" style="width:0%" id="tpf-${topic.id}"></div></div>
            <span class="topic-progress-text">${Math.round(pct)}%</span>
          </div>`:''}
        </div>
        <span class="topic-chevron">›</span>
      </button>
      <div class="topic-body">
        <div class="topic-description">${topic.description}</div>
        <div class="session-cards" id="sessions-${topic.id}"></div>
        <div id="mastery-${topic.id}"></div>
      </div>`;

    list.appendChild(card);

    // Animate progress bar
    if(!isLocked){
      requestAnimationFrame(()=>setTimeout(()=>{
        const bar=document.getElementById(`tpf-${topic.id}`);
        if(bar) bar.style.width=pct+'%';
      },200));
    }

    // Render sessions and mastery if expanded
    if(isExpanded){
      renderSessions(topic.id, topicSessions, mastery);
      renderMastery(topic.id, topic, mastery, doneCount>=topicSessions.length);
    }
  });

  // Conclusion
  if(conclusionTopic){
    document.getElementById('conclusion-card').style.display='block';
  }
}

function toggleTopic(topicId){
  const card = document.getElementById(`topic-${topicId}`);
  if(!card) return;

  const mastery = masteryData.find(m=>m.topic_id===topicId);
  const status = mastery?mastery.status:'locked';
  if(status==='locked') return; // Can't expand locked topics

  if(expandedTopics.has(topicId)){
    expandedTopics.delete(topicId);
    card.classList.remove('expanded');
  } else {
    expandedTopics.add(topicId);
    card.classList.add('expanded');
    const topic = allTopics.find(t=>t.id===topicId);
    const sessions = allSessions.filter(s=>s.topic_id===topicId);
    const doneCount = sessions.filter(s=>completedIds.includes(s.id)).length;
    renderSessions(topicId, sessions, mastery);
    renderMastery(topicId, topic, mastery, doneCount>=sessions.length);
  }
}

function scrollToTopic(topicId){
  const el = document.getElementById(`topic-${topicId}`);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
  if(!expandedTopics.has(topicId)) toggleTopic(topicId);
}

// ── SESSIONS ─────────────────────────────────────────────────
function renderSessions(topicId, sessions, mastery){
  const container = document.getElementById(`sessions-${topicId}`);
  if(!container) return;
  container.innerHTML='';

  // Find current session for this topic
  const currentSession = sessions.find(s=>!completedIds.includes(s.id));

  sessions.forEach(s=>{
    const isDone = completedIds.includes(s.id);
    const isCurrent = currentSession&&s.id===currentSession.id;
    const isExpanded = expandedSessions.has(s.id);

    const card = document.createElement('div');
    card.className=`session-card${isDone?' done':isCurrent?' current-session':''}${isExpanded?' expanded':''}`;
    card.id=`session-card-${s.id}`;

    card.innerHTML=`
      <button class="session-card-header" onclick="toggleSession('${s.id}')">
        <span class="session-id">${s.id}</span>
        <span class="session-title-text">${s.title}</span>
        <span class="session-coins-badge">+${s.coins}</span>
        ${isDone?'<span class="session-check">✦</span>':'<span class="session-expand-icon">›</span>'}
      </button>
      <div class="session-body" id="session-body-${s.id}"></div>`;

    container.appendChild(card);

    if(isExpanded) renderSessionBody(s, isDone);
  });
}

function toggleSession(sessionId){
  const card = document.getElementById(`session-card-${sessionId}`);
  if(!card) return;
  if(expandedSessions.has(sessionId)){
    expandedSessions.delete(sessionId);
    card.classList.remove('expanded');
  } else {
    expandedSessions.add(sessionId);
    card.classList.add('expanded');
    const session = allSessions.find(s=>s.id===sessionId);
    const isDone = completedIds.includes(sessionId);
    if(session) renderSessionBody(session, isDone);
  }
}

function renderSessionBody(s, isDone){
  const body = document.getElementById(`session-body-${s.id}`);
  if(!body) return;

  // Description
  let html=`<div class="session-description">${s.description||''}</div>`;

  // Key concepts
  if(s.key_concepts&&s.key_concepts.length){
    html+=`<div class="concepts-label">Key Concepts</div><ul class="concepts-list">`;
    s.key_concepts.forEach(c=>{
      html+=`<li class="concept-item"><span class="concept-mark">›</span>${c}</li>`;
    });
    html+=`</ul>`;
  }

  // Video
  if(s.video_url){
    const videoId = extractYouTubeId(s.video_url);
    if(videoId){
      html+=`<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen loading="lazy"></iframe></div>`;
    } else {
      html+=`<div class="video-wrap"><div class="video-placeholder"><span class="video-placeholder-icon">▶</span>Video Available</div></div>`;
    }
  } else {
    html+=`<div class="video-wrap"><div class="video-placeholder"><span class="video-placeholder-icon">▶</span>Video Coming Soon</div></div>`;
  }

  // Game link
  if(s.game_url){
    html+=`<a class="game-link" href="${s.game_url}"><span class="game-link-icon">⚔</span><span class="game-link-text">Play the Expedition Game</span><span class="game-link-arrow">›</span></a>`;
  }

  // Journal prompt
  if(s.journal_prompt){
    html+=`<div class="journal-box"><div class="journal-label">Field Journal</div><div class="journal-text">${s.journal_prompt}</div></div>`;
  }

  // Complete button or done indicator
  if(isDone){
    html+=`<div class="session-done-indicator"><span>✦</span>Session Complete<span>✦</span></div>`;
  } else {
    html+=`<button class="session-complete-btn" id="complete-btn-${s.id}" onclick="completeSession('${s.id}',${s.coins})">Mark Session Complete — +${s.coins} Coins</button>`;
  }

  body.innerHTML=html;
}

function extractYouTubeId(url){
  if(!url) return null;
  const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/);
  return match?match[1]:null;
}

// ── COMPLETE SESSION ──────────────────────────────────────────
async function completeSession(sessionId, coins){
  if(completedIds.includes(sessionId)) return;
  const btn = document.getElementById(`complete-btn-${sessionId}`);
  if(btn){ btn.disabled=true; btn.textContent='Saving...';}

  const session = allSessions.find(s=>s.id===sessionId);
  const topic = session?allTopics.find(t=>t.id===session.topic_id):null;

  // Insert session progress
  const {error} = await sb.from('session_progress').insert({
    explorer_id: profile.id,
    session_id:  sessionId,
    completed_at:new Date().toISOString(),
    coins_awarded:coins,
  });
  if(error){ console.error(error); if(btn){btn.disabled=false;btn.textContent=`Mark Session Complete — +${coins} Coins`;} return;}

  // Award coins
  const newCoins    = (profile.coins||0)+coins;
  const newLifetime = (profile.lifetime_coins||0)+coins;
  const newSessions = (profile.sessions_attended||0)+1;
  await Promise.all([
    sb.from('profiles').update({coins:newCoins,lifetime_coins:newLifetime,sessions_attended:newSessions}).eq('id',profile.id),
    sb.from('activity_log').insert({explorer_id:profile.id,amount:coins,reason:`Session: ${session?.title||sessionId}`,created_at:new Date().toISOString()}),
  ]);
  profile.coins=newCoins;
  profile.lifetime_coins=newLifetime;
  profile.sessions_attended=newSessions;

  completedIds.push(sessionId);

  // Check if topic mastery should become available
  if(topic){
    const topicSessions = allSessions.filter(s=>s.topic_id===topic.id);
    const doneCount = topicSessions.filter(s=>completedIds.includes(s.id)).length;
    if(doneCount>=topicSessions.length){
      // All sessions done — make mastery available if it was locked or available
      const mastery=masteryData.find(m=>m.topic_id===topic.id);
      if(mastery&&mastery.status==='available'){
        await sb.from('topic_mastery').update({status:'available'}).eq('id',mastery.id);
      }
      // Unlock next topic
      await unlockNextTopic(topic.id);
    }
  }

  // Coin rain and re-render
  coinRain(coins);
  renderAll();
}

async function unlockNextTopic(completedTopicId){
  const mainTopics = allTopics.filter(t=>!t.is_conclusion).sort((a,b)=>a.order_index-b.order_index);
  const idx = mainTopics.findIndex(t=>t.id===completedTopicId);
  if(idx<0||idx>=mainTopics.length-1) return;
  const nextTopic = mainTopics[idx+1];
  const nextMastery = masteryData.find(m=>m.topic_id===nextTopic.id);
  if(nextMastery&&nextMastery.status==='locked'){
    await sb.from('topic_mastery').update({status:'available'}).eq('id',nextMastery.id);
    nextMastery.status='available';
  }
}

// ── MASTERY ASSIGNMENT ────────────────────────────────────────
function renderMastery(topicId, topic, mastery, allSessionsDone){
  const container = document.getElementById(`mastery-${topicId}`);
  if(!container) return;

  const status = mastery?mastery.status:'locked';
  const canSubmit = allSessionsDone && status==='available';
  const isPending = status==='pending';
  const isComplete = status==='complete';

  let statusLabel = isComplete?'Complete':isPending?'Awaiting Approval':canSubmit?'Ready to Submit':'Complete all sessions first';
  let badgeClass = isComplete?'complete':isPending?'pending':canSubmit?'available':'locked';

  container.innerHTML=`
    <div class="mastery-card">
      <div class="mastery-eyebrow">Mastery Assignment</div>
      <div class="mastery-title">Topic ${topicId} Mastery</div>
      <div class="mastery-text">${topic.mastery_assignment}</div>
      <div class="mastery-status-row">
        <span class="mastery-badge ${badgeClass}">${statusLabel}</span>
        <span class="mastery-coins-badge">+${topic.mastery_coins} coins</span>
        ${canSubmit?`<button class="mastery-submit-btn" onclick="submitMastery(${topicId})">I'm Ready to Present</button>`:''}
        ${isPending?'<span style="font-family:Cinzel,serif;font-size:0.68rem;color:rgba(167,139,250,0.7);">Awaiting parent approval</span>':''}
        ${isComplete?'<span style="font-family:Cinzel,serif;font-size:0.68rem;color:rgba(134,239,172,0.7);">✦ Mastered</span>':''}
      </div>
    </div>`;
}

async function submitMastery(topicId){
  const mastery = masteryData.find(m=>m.topic_id===topicId);
  if(!mastery||mastery.status!=='available') return;

  await sb.from('topic_mastery').update({
    status:'pending',submitted_at:new Date().toISOString()
  }).eq('id',mastery.id);
  mastery.status='pending';

  // Re-render topic
  const topic = allTopics.find(t=>t.id===topicId);
  const sessions = allSessions.filter(s=>s.topic_id===topicId);
  const doneCount = sessions.filter(s=>completedIds.includes(s.id)).length;
  renderMastery(topicId, topic, mastery, doneCount>=sessions.length);
}

// ── COIN RAIN ─────────────────────────────────────────────────
function coinRain(amount){
  const n=Math.min(Math.floor(amount/8)+3,16);
  const c=document.getElementById('coin-rain');
  const symbols=['✦','◈','☩','⊕'];
  const colors=['#ffd700','#f0c96e','#c9922a'];
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='coin-p';
      el.textContent=symbols[Math.floor(Math.random()*symbols.length)];
      el.style.left=Math.random()*92+'vw';
      el.style.animationDuration=(1.2+Math.random()*1.8)+'s';
      el.style.color=colors[Math.floor(Math.random()*colors.length)];
      el.style.filter=`drop-shadow(0 0 6px ${colors[0]})`;
      c.appendChild(el);
      setTimeout(()=>el.remove(),3500);
    },i*65);
  }
}
</script>
